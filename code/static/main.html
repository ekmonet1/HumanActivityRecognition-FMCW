<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RADAR Action Classification Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #e5e5ea; font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; }
    .iphone-frame { width: 390px; height: 844px; background-color: #000; border-radius: 60px; padding: 14px; box-shadow: 0 0 20px rgba(0, 0, 0, 0.6); position: relative; }
    .iphone-screen { width: 100%; height: 100%; border-radius: 44px; background-color: #f2f2f7; overflow: hidden; position: relative; padding-bottom: 20px; }
    header { background-color: #fff; padding: 24px 20px 16px 20px; border-bottom: 1px solid #ccc; }
    .user-info .user-name { font-size: 22px; font-weight: bold; }
    .date { font-size: 14px; color: #666; margin-top: 4px; }
    main.dashboard { display: flex; flex-direction: column; gap: 12px; padding: 16px; }
    .row { display: flex; justify-content: space-between; gap: 12px; }
    .card { flex: 1; background-color: #fff; border-radius: 16px; padding: 16px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; justify-content: center; align-items: flex-start; }
    .card-title { font-size: 15px; color: #ff3b30; margin-bottom: 6px; }
    .card-value { font-size: 24px; font-weight: bold; }
    .card-unit { font-size: 14px; color: #888; margin-left: 6px; }
    footer { text-align: center; padding: 16px; color: #aaa; font-size: 14px; }
    .notch { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 150px; height: 30px; background-color: #000; border-radius: 0 0 20px 20px; z-index: 2; }
    #probabilityChart { background-color: #fff; border-radius: 16px; padding: 8px; margin-top: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    .fall-alert { background-color: #ff3b30; color: white; text-align: center; font-size: 18px; font-weight: bold; padding: 14px; border-radius: 16px; margin-top: 12px; animation: blink 1s infinite; }
    .hidden { display: none; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
</head>
<body>
<div class="iphone-frame">
  <div class="notch"></div>
  <div class="iphone-screen">
    <header>
      <div class="user-info">
        <div class="user-name">MuST-Net</div>
        <div class="date" id="today"></div>
      </div>
    </header>

    <!-- Summary 메뉴 버튼 -->
    <a href="summary.html"
    style="position:absolute; top:40px; right:16px; z-index:5;
          text-decoration:none; color:#ff3b30; background:#fff; border:1px solid #ff3b3055;
          padding:8px 12px; border-radius:10px; font-size:14px; box-shadow:0 2px 6px rgba(0,0,0,0.1);">
    ☰ Summary
    </a>


    <main class="dashboard">
      <div class="row">
        <div class="card">
          <div class="card-title">Squats</div>
          <div class="card-value" id="squat-count">15<span class="card-unit">times</span></div>
        </div>
        <div class="card">
          <div class="card-title">Stand-ups</div>
          <div class="card-value" id="stand-count">22<span class="card-unit">times</span></div>
        </div>
      </div>

      <div class="row">
        <div class="card">
          <div class="card-title">Current Action</div>
          <div class="card-value" id="current-action">Walking</div>
        </div>
        <div class="card">
          <div class="card-title">Confidence</div>
          <div class="card-value" id="current-prob">92.1<span class="card-unit">%</span></div>
        </div>
      </div>

      <canvas id="probabilityChart" width="300" height="200"></canvas>
      <div id="fall-alert" class="fall-alert hidden">⚠ Fall detected! Immediate action required ⚠</div>
    </main>

    <footer>RADAR-based Multi-Activity Detection System</footer>
    <button id="wake-btn" style="position: fixed; top: 16px; right: 16px;
    padding: 8px 12px; background:#ff3b30; color:#fff;
    border:none; border-radius:8px; cursor:pointer;">Start</button>
  </div>
</div>

<audio id="alarm-sound" src="/static/alarm.mp3" preload="auto" loop></audio>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  const alarmSound = document.getElementById('alarm-sound');
  const wakeBtn    = document.getElementById('wake-btn');

  document.getElementById("today").innerText =
    new Date().toLocaleDateString("en-US", { year: 'numeric', month: 'long', day: 'numeric' });

  const labels = ['none', 'walk_away', 'walk_toward', 'sit', 'stand', 'squat', 'fall'];
  const data = {
    labels: labels,
    datasets: [{
      label: 'Action Classification Probability',
      backgroundColor: '#ff3b30aa',
      borderColor: '#ff3b30',
      data: [0.02, 0.12, 0.25, 0.15, 0.10, 0.30, 0.06]
    }]
  };

  const ctx = document.getElementById('probabilityChart').getContext('2d');
  const probabilityChart = new Chart(ctx, {
    type: 'bar',
    data: data,
    options: {
      responsive: true,
      scales: {
        y: { beginAtZero: true, max: 1 }
      }
    }
  });

  // Remember whether a fall has been triggered before
  let fallTriggered = false;
  const fallAlert   = document.getElementById('fall-alert');

  // 1) When the user presses 'Start'
  wakeBtn.addEventListener('click', () => {
    // Wake up the audio context via play()
    alarmSound.play()
      .then(() => {
        alarmSound.pause();        // pause immediately
        alarmSound.currentTime = 0;
        wakeBtn.remove();          // remove the button
        fetchDataAndUpdateUI();    // start the real app logic
      })
      .catch(console.error);
  }, { once: true });

  async function fetchDataAndUpdateUI() {
    try {
      const res  = await fetch("http://127.0.0.1:8000/status");
      const json = await res.json();

      const action = json.current_action;
      document.getElementById("current-action").innerText = action;
      document.getElementById("squat-count").innerHTML = `${json.squat_count}<span class="card-unit">times</span>`;
      document.getElementById("stand-count").innerHTML = `${json.stand_count}<span class="card-unit">times</span>`;

      const prob = json.class_probs[action] || 0;
      document.getElementById("current-prob").innerHTML = `${(prob * 100).toFixed(1)}<span class="card-unit">%</span>`;

      // fall-alert show/hide logic
      if (action === "fall") {
        fallTriggered = true;
        fallAlert.classList.remove("hidden");
      } else if (fallTriggered && action === "none") {
        // fall → none: keep alert visible
      } else {
        // fall → other action: hide alert and reset state
        fallTriggered = false;
        fallAlert.classList.add("hidden");
      }

      // sound play/stop
      if (!fallAlert.classList.contains("hidden")) {
        if (alarmSound.paused) alarmSound.play();
      } else {
        alarmSound.pause();
        alarmSound.currentTime = 0;
      }

      // chart update
      probabilityChart.data.datasets[0].data = [
        json.class_probs.none,
        json.class_probs.walk_away,
        json.class_probs.walk_toward,
        json.class_probs.sit,
        json.class_probs.stand,
        json.class_probs.squat,
        json.class_probs.fall
      ];
      probabilityChart.update();

    } catch (err) {
      console.error("Failed to fetch data:", err);
    }
  }

  setInterval(fetchDataAndUpdateUI, 100);
</script>

<script>
  function onStandDetected() {
    const n = Number(localStorage.getItem('todayStandCount') ?? 0) + 1;
    localStorage.setItem('todayStandCount', String(n));
  }
  function onSquatDetected() {
    const n = Number(localStorage.getItem('todaySquatCount') ?? 0) + 1;
    localStorage.setItem('todaySquatCount', String(n));
  }
  // 최초 목표치(필요 시 한 번만 세팅)
  if (localStorage.getItem('todayGoalTarget') === null) {
    localStorage.setItem('todayGoalTarget', '100');
  }
  </script>


</body>
</html>
