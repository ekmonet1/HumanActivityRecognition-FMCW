<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Splash</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { display:flex; justify-content:center; align-items:center; height:100vh; background-color:#e5e5ea; font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif; }
    .iphone-frame { width:390px; height:844px; background:#000; border-radius:60px; padding:14px; box-shadow:0 0 20px rgba(0,0,0,0.6); position:relative; }
    .iphone-screen { width:100%; height:100%; border-radius:44px; background-color:#f2f2f7; overflow:hidden; position:relative; }
    .notch { position:absolute; top:8px; left:50%; transform:translateX(-50%); width:150px; height:30px; background:#000; border-radius:0 0 20px 20px; z-index:2; }

    .center { height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:16px; padding:24px; }
    .logo {
      width:84px; height:84px; border-radius:22px; background:#ff3b30; display:flex; justify-content:center; align-items:center; box-shadow:0 6px 16px rgba(255,59,48,0.35);
      animation: pop 600ms ease-out forwards;
    }
    .logo svg { width:48px; height:48px; color:#fff }
    h1 { font-size:22px; font-weight:800; color:#111; }
    p  { font-size:14px; color:#666; }

    .spinner { width:36px; height:36px; border-radius:50%; border:4px solid rgba(0,0,0,0.1); border-top-color:#ff3b30; animation:spin 1s linear infinite; margin-top:6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pop { from { transform: scale(0.85); opacity:0; } to { transform: scale(1); opacity:1; } }
  </style>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => { window.location.href = 'main.html'; }, 10000);
    });
  </script>
</head>
<body>
  <div class="iphone-frame">
    <div class="notch"></div>
    <div class="iphone-screen">
      <div class="center">
        <div class="logo" aria-hidden="true">
          <!-- 심플 로고 -->
          <svg viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
            <path d="M7 13.5c2 .5 3.5-2 5-2s3 2 5 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <h1>MuST-Net</h1>
        <p>데이터 준비 중…</p>
        <div class="spinner" role="status" aria-label="로딩 중"></div>
      </div>
    </div>
  </div>
</body>
</html>
